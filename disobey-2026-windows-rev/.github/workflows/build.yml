name: Build artifact on commit

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Setup XMake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Setup UV
        uses: astral-sh/setup-uv@v7

      - name: Build distribution data
        run: |
          cd dist
          xmake.exe repo --update
          xmake.exe config --yes --mangle_pdbpaths=y
          xmake.exe

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/build/windows/x64/release/dist.exe
            dist/build/windows/x64/release/runtime.dll
          if-no-files-found: error
